<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/9. Project/currency.css" />
  </head>
  <body>
    <div class="container">
      <h2>Currency Converter</h2>
      <form action="">
        <div class="amount">
          <p>Enter Amount</p>
          <input type="text" value="1" />
        </div>

        <!-- -------- DropDown -------- -->
        <div class="dropdown">

          <!---------------- From -------------->
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <img src="https://flagsapi.com/US/flat/64.png" alt="" />
              <select name="from" id="from">
                <!-- <option value="USD">USD</option>
                <option value="PKR">PKR</option>
                <option value="SAR">SAR</option>
                <option value="EUR">EUR</option> -->
              </select>
            </div>
          </div>

          <i class="fa-solid fa-arrow-right-arrow-left"></i>

          <!---------------- To -------------->
          <div class="to">
            <p>To</p>
            <div class="select-container">
              <img src="https://flagsapi.com/PK/flat/64.png" alt="" />
              <select name="to" id="to">
                <!-- <option value="USD">USD</option>
                <option value="PKR" selected>PKR</option>
                <option value="SAR">SAR</option>
                <option value="EUR">EUR</option> -->
              </select>
            </div>
          </div>
        </div>

        <!-- ----------- USD to PKR --------->
        <div class="msg">1USD = 279PKR</div>
        <button>Get Exhange Rate</button>
      </form>
    </div>

    <script src="/9. Project/codes.js"></script>
    <script src="/9. Project/ap.js"></script>
    
  </body>
</html>
